<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ashen Vale — painted-scene manifest picker</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; font: 13px/1.4 system-ui, sans-serif;
    background: #14171c; color: #d7dde5;
    display: flex; height: 100vh; overflow: hidden;
  }
  #stage { flex: 1; overflow: auto; background: #0d0f12; position: relative; }
  #wrap { position: relative; width: max-content; }
  canvas { display: block; cursor: crosshair; image-rendering: pixelated; }
  #side {
    width: 380px; flex: none; background: #191d23; border-left: 1px solid #2a3038;
    display: flex; flex-direction: column; overflow: hidden;
  }
  header { padding: 10px 12px; border-bottom: 1px solid #2a3038; }
  header h1 { margin: 0 0 2px; font-size: 14px; }
  header p { margin: 0; color: #8a94a2; font-size: 11px; }
  .panel { padding: 10px 12px; border-bottom: 1px solid #2a3038; }
  .panel h2 { margin: 0 0 8px; font-size: 11px; text-transform: uppercase;
    letter-spacing: .06em; color: #8a94a2; }
  .modes { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  button, label.file, select {
    background: #232933; color: #d7dde5; border: 1px solid #38414d;
    border-radius: 6px; padding: 6px 8px; font: inherit; cursor: pointer;
  }
  button:hover, label.file:hover { background: #2c333f; }
  button.active { background: #3b6ea5; border-color: #4f86c6; color: #fff; }
  button.ghost { padding: 4px 8px; }
  .row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .row + .row { margin-top: 6px; }
  input[type=file] { display: none; }
  .readout { font-variant-numeric: tabular-nums; color: #9fd0ff; }
  .count { color: #7f8a98; font-size: 11px; }
  #out {
    flex: 1; width: 100%; resize: none; border: 0; border-top: 1px solid #2a3038;
    background: #0d0f12; color: #cfe3c9; font: 12px/1.45 ui-monospace, monospace;
    padding: 10px 12px; white-space: pre;
  }
  .hint { color: #7f8a98; font-size: 11px; margin-top: 6px; }
  kbd { background: #2c333f; border: 1px solid #434c58; border-radius: 4px;
    padding: 0 5px; font: 11px ui-monospace, monospace; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; display: inline-block;
    vertical-align: -1px; margin-right: 4px; border: 1px solid #0006; }
</style>
</head>
<body>
  <div id="stage"><div id="wrap"><canvas id="cv"></canvas></div></div>
  <div id="side">
    <header>
      <h1>Manifest picker</h1>
      <p>Read backdrop-pixel coords for <code>data/scenes/&lt;id&gt;.json</code> —
         no external editor needed.</p>
    </header>

    <div class="panel">
      <div class="row">
        <label class="file">Load backdrop…<input id="file" type="file" accept="image/*" /></label>
        <button id="grid" class="ghost">Grid: on</button>
        <button id="zoomout" class="ghost">−</button>
        <span id="zoom" class="readout">100%</span>
        <button id="zoomin" class="ghost">+</button>
      </div>
      <div class="hint">Cursor: <span id="cur" class="readout">—</span>
        &nbsp;·&nbsp; canvas <span id="dims" class="readout">—</span></div>
    </div>

    <div class="panel">
      <h2>What am I picking?</h2>
      <div class="modes">
        <button data-mode="spawn"><span class="swatch" style="background:#ffd24a"></span>Spawn <kbd>1</kbd></button>
        <button data-mode="walk"><span class="swatch" style="background:#4ad0ff"></span>Walk polygon <kbd>2</kbd></button>
        <button data-mode="light"><span class="swatch" style="background:#ff9c50"></span>Lights <kbd>3</kbd></button>
        <button data-mode="npc"><span class="swatch" style="background:#c58cff"></span>NPCs <kbd>4</kbd></button>
        <button data-mode="occ_poly"><span class="swatch" style="background:#7bffa0"></span>Occluder poly <kbd>5</kbd></button>
        <button data-mode="occ_anchor"><span class="swatch" style="background:#ff6b6b"></span>Occluder anchor <kbd>6</kbd></button>
      </div>
      <div class="row" style="margin-top:8px">
        <button id="undo" class="ghost">Undo point <kbd>u</kbd></button>
        <button id="newocc" class="ghost">New occluder</button>
        <button id="clear" class="ghost">Clear all</button>
      </div>
      <div class="hint" id="status">Click on the backdrop to add points.</div>
    </div>

    <div class="panel" style="padding-bottom:6px">
      <div class="row">
        <h2 style="margin:0;flex:1">Manifest fragment</h2>
        <button id="copy" class="ghost">Copy</button>
        <button id="download" class="ghost">Download .json</button>
      </div>
    </div>
    <textarea id="out" readonly spellcheck="false"></textarea>
  </div>

<script>
"use strict";
const DEFAULT_W = 1536, DEFAULT_H = 1024;
const COLORS = {
  spawn: "#ffd24a", walk: "#4ad0ff", light: "#ff9c50", npc: "#c58cff",
  occ_poly: "#7bffa0", occ_anchor: "#ff6b6b",
};
const MODE_LABEL = {
  spawn: "Spawn point (single)", walk: "Walk polygon",
  light: "Light positions", npc: "NPC positions",
  occ_poly: "Occluder polygon", occ_anchor: "Occluder anchor",
};

const state = {
  img: null, imgW: DEFAULT_W, imgH: DEFAULT_H, scale: 1, showGrid: true,
  mode: "walk", cursor: null,
  spawn: null, walk: [], lights: [], npcs: [],
  occluders: [{ polygon: [], anchor: null }],
};

const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
const $ = (id) => document.getElementById(id);

function fitScale() {
  const stage = $("stage");
  const sw = stage.clientWidth - 24, sh = stage.clientHeight - 24;
  state.scale = Math.min(1, sw / state.imgW, sh / state.imgH) || 1;
}

function resize() {
  cv.width = Math.round(state.imgW * state.scale);
  cv.height = Math.round(state.imgH * state.scale);
  $("zoom").textContent = Math.round(state.scale * 100) + "%";
  $("dims").textContent = state.imgW + "×" + state.imgH;
  render();
}

function toPx(evt) {
  const r = cv.getBoundingClientRect();
  const x = (evt.clientX - r.left) / state.scale;
  const y = (evt.clientY - r.top) / state.scale;
  return [Math.round(x), Math.round(y)];
}

function activeOcc() { return state.occluders[state.occluders.length - 1]; }

function render() {
  ctx.clearRect(0, 0, cv.width, cv.height);
  if (state.img) ctx.drawImage(state.img, 0, 0, cv.width, cv.height);
  else { ctx.fillStyle = "#1b2027"; ctx.fillRect(0, 0, cv.width, cv.height); }
  if (state.showGrid) drawGrid();
  drawPolygon(state.walk, COLORS.walk, true);
  for (const occ of state.occluders) {
    drawPolygon(occ.polygon, COLORS.occ_poly, true);
    if (occ.anchor) drawMarker(occ.anchor, COLORS.occ_anchor, "▲");
  }
  state.lights.forEach((p, i) => drawMarker(p, COLORS.light, "✦" + (i + 1)));
  state.npcs.forEach((p, i) => drawMarker(p, COLORS.npc, "N" + (i + 1)));
  if (state.spawn) drawMarker(state.spawn, COLORS.spawn, "spawn");
  if (state.cursor) drawCross(state.cursor);
  updateOutput();
}

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.10)";
  ctx.fillStyle = "rgba(200,220,255,0.45)";
  ctx.lineWidth = 1; ctx.font = "10px ui-monospace, monospace";
  for (let x = 0; x <= state.imgW; x += 100) {
    const sx = x * state.scale;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, cv.height); ctx.stroke();
    ctx.fillText(String(x), sx + 2, 10);
  }
  for (let y = 0; y <= state.imgH; y += 100) {
    const sy = y * state.scale;
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(cv.width, sy); ctx.stroke();
    ctx.fillText(String(y), 2, sy + 10);
  }
  ctx.restore();
}

function drawPolygon(pts, color, close) {
  if (!pts.length) return;
  ctx.save();
  ctx.strokeStyle = color; ctx.lineWidth = 1.5;
  ctx.fillStyle = color.replace(")", ",0.14)").replace("rgb", "rgba");
  ctx.beginPath();
  pts.forEach((p, i) => {
    const x = p[0] * state.scale, y = p[1] * state.scale;
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  });
  if (close && pts.length > 2) ctx.closePath();
  ctx.stroke();
  pts.forEach((p) => dot(p, color));
  ctx.restore();
}

function dot(p, color) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(p[0] * state.scale, p[1] * state.scale, 3, 0, 7); ctx.fill();
  ctx.restore();
}

function drawMarker(p, color, label) {
  dot(p, color);
  ctx.save();
  ctx.fillStyle = color; ctx.font = "11px ui-monospace, monospace";
  ctx.fillText(label, p[0] * state.scale + 5, p[1] * state.scale - 5);
  ctx.restore();
}

function drawCross(p) {
  const x = p[0] * state.scale, y = p[1] * state.scale;
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, 0); ctx.lineTo(x, cv.height);
  ctx.moveTo(0, y); ctx.lineTo(cv.width, y); ctx.stroke();
  ctx.restore();
}

function addPoint(px) {
  switch (state.mode) {
    case "spawn": state.spawn = px; break;
    case "walk": state.walk.push(px); break;
    case "light": state.lights.push(px); break;
    case "npc": state.npcs.push(px); break;
    case "occ_poly": activeOcc().polygon.push(px); break;
    case "occ_anchor": activeOcc().anchor = px; break;
  }
  render();
}

function undo() {
  switch (state.mode) {
    case "spawn": state.spawn = null; break;
    case "walk": state.walk.pop(); break;
    case "light": state.lights.pop(); break;
    case "npc": state.npcs.pop(); break;
    case "occ_poly": activeOcc().polygon.pop(); break;
    case "occ_anchor": activeOcc().anchor = null; break;
  }
  render();
}

// Compose only the non-empty sections, in manifest field order, as a
// paste-ready fragment. Lights/NPCs get placeholder fields to fill in.
function buildManifest() {
  const m = {};
  if (state.spawn) m.spawn = state.spawn;
  if (state.walk.length) m.walk_polygon = state.walk;
  if (state.lights.length)
    m.lights = state.lights.map((px) => ({
      px, color: "#ffab55", energy: 4.0, range: 8.0, fire: true,
    }));
  if (state.npcs.length)
    m.npcs = state.npcs.map((pos, i) => ({
      id: "npc" + (i + 1), name: "", pos,
      palette: { body: "#59636f", head: "#c8a284" },
      dialogue: "", interact_radius: 150,
    }));
  const occ = state.occluders.filter((o) => o.polygon.length >= 3);
  if (occ.length)
    m.occluders = occ.map((o) => ({
      polygon: o.polygon, anchor: o.anchor || o.polygon[0],
    }));
  return m;
}

function updateOutput() {
  const m = buildManifest();
  let text = Object.keys(m).length
    ? JSON.stringify(m, null, 2)
    : "// pick points on the backdrop — fragments appear here";
  // Wall torches need a height hint; remind the author (JSON has no comments,
  // so this note lives outside the copyable block via the status line).
  $("out").value = text;
  const occ = activeOcc();
  $("status").textContent =
    MODE_LABEL[state.mode] +
    "  ·  walk " + state.walk.length +
    " · lights " + state.lights.length +
    " · npcs " + state.npcs.length +
    " · occluders " + state.occluders.filter((o) => o.polygon.length >= 3).length +
    (state.mode.startsWith("occ")
      ? " (current: " + occ.polygon.length + " pts" +
        (occ.anchor ? ", anchored" : ", no anchor") + ")"
      : "");
}

function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll("[data-mode]").forEach((b) =>
    b.classList.toggle("active", b.dataset.mode === mode));
  render();
}

// ---- events ----
cv.addEventListener("click", (e) => addPoint(toPx(e)));
cv.addEventListener("mousemove", (e) => {
  state.cursor = toPx(e);
  $("cur").textContent = state.cursor[0] + ", " + state.cursor[1];
  render();
});
cv.addEventListener("mouseleave", () => { state.cursor = null; render(); });

$("file").addEventListener("change", (e) => {
  const f = e.target.files[0];
  if (!f) return;
  const img = new Image();
  img.onload = () => {
    state.img = img; state.imgW = img.naturalWidth; state.imgH = img.naturalHeight;
    fitScale(); resize();
  };
  img.src = URL.createObjectURL(f);
});

$("grid").addEventListener("click", () => {
  state.showGrid = !state.showGrid;
  $("grid").textContent = "Grid: " + (state.showGrid ? "on" : "off");
  render();
});
$("zoomin").addEventListener("click", () => { state.scale = Math.min(4, state.scale * 1.25); resize(); });
$("zoomout").addEventListener("click", () => { state.scale = Math.max(0.1, state.scale / 1.25); resize(); });
$("undo").addEventListener("click", undo);
$("newocc").addEventListener("click", () => {
  if (activeOcc().polygon.length) state.occluders.push({ polygon: [], anchor: null });
  setMode("occ_poly");
});
$("clear").addEventListener("click", () => {
  state.spawn = null; state.walk = []; state.lights = []; state.npcs = [];
  state.occluders = [{ polygon: [], anchor: null }];
  render();
});
$("copy").addEventListener("click", async () => {
  try { await navigator.clipboard.writeText($("out").value); $("copy").textContent = "Copied"; }
  catch (_) { $("out").select(); document.execCommand("copy"); $("copy").textContent = "Copied"; }
  setTimeout(() => ($("copy").textContent = "Copy"), 1200);
});
$("download").addEventListener("click", () => {
  const blob = new Blob([$("out").value], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "manifest_fragment.json"; a.click();
});
document.querySelectorAll("[data-mode]").forEach((b) =>
  b.addEventListener("click", () => setMode(b.dataset.mode)));
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
  const keys = { "1": "spawn", "2": "walk", "3": "light", "4": "npc", "5": "occ_poly", "6": "occ_anchor" };
  if (keys[e.key]) setMode(keys[e.key]);
  else if (e.key === "u") undo();
});

// Expose state for headless verification (Playwright drives these).
window.__picker = { state, addPoint, setMode, buildManifest };

fitScale(); resize(); setMode("walk");
</script>
</body>
</html>
