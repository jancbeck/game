name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  GODOT_VERSION: "4.5"

jobs:
  static-checks:
    name: "Lint & format"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "gdtoolkit==4.*"
      - name: Parse all GDScript
        run: find scripts test tools -name '*.gd' -print0 | xargs -0 gdparse
      - name: Lint
        run: gdlint scripts/ test/ tools/
      - name: Format check
        run: gdformat --check scripts/ test/ tools/
      - name: Validate JSON content
        run: |
          python - <<'EOF'
          import json, pathlib, sys
          bad = []
          for p in pathlib.Path("data").rglob("*.json"):
              try:
                  d = json.loads(p.read_text())
                  if "id" not in d:
                      bad.append(f"{p}: missing id")
              except Exception as e:
                  bad.append(f"{p}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("All content JSON valid")
          EOF

  smoke-test:
    name: "Headless boot & playthrough"
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
      - name: Install Godot
        run: |
          curl -sSL -o godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
      - name: Import project
        run: godot --headless --import || true
      - name: Run smoke test
        run: godot --headless -s tools/smoke_test.gd

  unit-tests:
    name: "gdUnit4 tests"
    runs-on: ubuntu-latest
    needs: static-checks
    steps:
      - uses: actions/checkout@v4
      - uses: MikeSchulze/gdUnit4-action@v1
        with:
          godot-version: "4.5"
          paths: "res://test"
          timeout: 10
          report-name: test-report.xml
